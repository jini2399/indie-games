name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -f out/
          git commit -m "🚀 Auto deploy: $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push origin $(git subtree split --prefix out/ main):gh-pages --force || true

      - name: Summary
        run: echo "✅ Deploy completed! Check https://jini2399.github.io/indie-games/capybara"
